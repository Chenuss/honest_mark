{% extends "base.html" %}
{% block title %}Редактирование — {{ equipment.name }}{% endblock %}
{% block content %}
<div class="row mt-4 justify-content-center"><div class="col-lg-6">
    <nav style="font-size:.85rem;margin-bottom:1.5rem;"><a href="/admin/equipment" style="color:var(--brand-accent);text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Оборудование</a></nav>
    <div class="card-dark p-4">
        <h5 style="font-weight:700;margin-bottom:1.5rem;"><i class="bi bi-pencil me-2" style="color:var(--brand-accent);"></i>Редактирование оборудования</h5>
        {% if error %}<div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;padding:.6rem .9rem;font-size:.85rem;margin-bottom:1.2rem;"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>{% endif %}
        <form method="POST" action="/admin/equipment/edit/{{ equipment.id }}">
            <div class="mb-3"><label class="form-label label-dark">Название</label><input type="text" name="name" required value="{{ equipment.name }}" class="form-control form-dark" autofocus></div>
            <div class="mb-3"><label class="form-label label-dark">Площадка</label>
                <select name="site_id" class="form-select form-dark">
                    <option value="0">— Без площадки —</option>
                    {% for s in sites %}<option value="{{ s.id }}" {% if equipment.site_id == s.id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2"><button type="submit" class="btn btn-accent"><i class="bi bi-check-lg me-1"></i>Сохранить</button><a href="/admin/equipment" class="btn btn-outline-secondary">Отмена</a></div>
        </form>
        <div class="mt-3" style="font-size:.8rem;color:var(--brand-text-muted);"><i class="bi bi-info-circle me-1"></i>ID: <span class="mono">{{ equipment.id }}</span></div>
    </div>
</div></div>
{% endblock %}
